<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>R7 Generator D — contention as foam-streak density (飞白条纹)</title>
<style>
  body { font: 14px/1.5 -apple-system, "Songti SC", serif; background: #f4ecdd; color: #3a2f22; margin: 24px; }
  h1 { font-size: 18px; } h2 { font-size: 15px; margin-top: 28px; }
  .panes { display: flex; gap: 14px; flex-wrap: wrap; }
  .pane { text-align: center; }
  .pane canvas { border: 1px solid #b8a888; border-radius: 4px; background: #dfe8e2; }
  .pane .cap { font-size: 12.5px; margin-top: 4px; }
  table { border-collapse: collapse; font-size: 12.5px; margin-top: 8px; }
  td, th { border: 1px solid #c7b795; padding: 3px 9px; text-align: right; }
  th { background: #eadfc6; }
  td.pass { color: #1c6b2f; font-weight: 600; } td.fail { color: #a02020; font-weight: 700; }
  .note { font-size: 12.5px; color: #6b5b40; max-width: 72em; }
  label { font-size: 13px; margin-right: 16px; }
</style>
</head>
<body>
<h1>R7-D · 争议度 = 海面躁动（泡沫条纹密度）— 自测演示</h1>
<p class="note">
  真实 FRAG（sea-mesh.ts）的移植：body fbm + 深度径向 + 岸线 halo/涟漪 + depth 压暗全部保留；
  <b>undertow 压暗块被替换为泡沫条纹块</b>。争议度只写「条纹密度」，不写明度轴。
  岸线 mask 用程序化岛屿替代（demo 专用 stand-in）。指标在固定 t=1.7 帧上用 readPixels 实测。
</p>
<label><input type="checkbox" id="staticMode"> 静态模式（reduced-motion 降级：uTime 冻结）</label>
<label>uDepth <input type="range" id="depth" min="0" max="0.42" step="0.01" value="0.30" style="vertical-align:middle"> <span id="depthVal">0.30</span></label>

<div class="panes" id="panes"></div>

<h2>感知验收判据（实测，开阔海裁片，t=1.7）</h2>
<div id="metrics">measuring…</div>
<p class="note" id="crit"></p>

<script>
const FRAG = `#version 300 es
precision highp float;
uniform float uTime, uU, uDepth, uTide, uDebug;
uniform vec2 uRes;
out vec4 o;
const vec3 SEA  = vec3(0.80, 0.87, 0.84);
const vec3 DEEP = vec3(0.42, 0.60, 0.60);
const vec3 FOAM = vec3(0.98, 0.95, 0.88);
const vec2 ISL  = vec2(-200.0, -150.0);

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
             mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
  return v;
}
// demo stand-in for the shore-mask texture: a procedural island blob
float landAt(vec2 w) {
  float r = length(w - ISL);
  float edge = 78.0 + 26.0 * fbm(w * 0.02);
  return 1.0 - smoothstep(edge - 6.0, edge + 6.0, r);
}
void main() {
  vec2 w = (gl_FragCoord.xy - 0.5 * uRes) * 2.0;   // world-screen units
  float here = landAt(w);

  // ---- verbatim structure of shipped FRAG ----
  float body = fbm(w * 0.006 + vec2(uTime * 0.015, uTime * 0.01));
  vec3 col = mix(SEA, DEEP, smoothstep(0.42, 0.66, body) * 0.5);
  float grain = noise(w * 0.9);
  col += (grain - 0.5) * 0.015;

  float radial = clamp(distance(w, ISL) / 380.0, 0.0, 1.0);
  col = mix(col, DEEP, smoothstep(0.0, 1.0, radial) * (0.28 + 0.55 * uDepth) * (1.0 - here));

  float nearL = 0.0;
  for (int i = 0; i < 8; i++) {
    float a = float(i) / 8.0 * 6.2831;
    nearL = max(nearL, landAt(w + vec2(cos(a), sin(a)) * 14.0));
  }
  float coast = nearL * (1.0 - here);
  float band = smoothstep(0.15, 0.6, coast);
  float lap = 0.78 + (0.14 + 0.16 * uTide) * sin(uTime * 0.8 + (w.x + w.y) * 0.04);
  float foamStrength = 0.24 + 0.20 * uTide;
  col = mix(col, FOAM, band * lap * foamStrength);
  float ripple = smoothstep(0.25, 0.7, coast) * (0.5 + 0.5 * sin((w.x + w.y) * 0.09 - uTime * 1.4));
  col = mix(col, FOAM, ripple * band * 0.14 * uTide);
  col *= (1.0 - uDepth);

  // ---- R7-D: contention = surface agitation as foam-streak DENSITY ----
  // Replaces the undertow darkening block. Strictly additive (never darkens).
  float agit = 0.0;
  if (uU > 0.001) {
    vec2 sw = vec2((w.x + w.y) * 0.045, (w.x - w.y) * 0.0045);    // 10:1 anisotropy
    float fil = fbm(sw + vec2(uTime * 0.05, uTime * 0.012));
    float streak = smoothstep(0.50, 0.54, fil) * (1.0 - smoothstep(0.56, 0.60, fil));
    float gate = fbm(w * 0.010 + vec2(31.7, 47.2));               // static placement field
    float th = 0.72 - 0.18 * smoothstep(0.55, 1.0, uU);           // density dial
    float open_ = smoothstep(th, th + 0.06, gate);
    float fleck = 0.75 + 0.5 * noise(w * 0.12);                   // dry-brush ink load
    float offshore = 1.0 - smoothstep(0.05, 0.30, coast);         // never inside shore halo
    agit = min(streak * fleck, 1.0) * open_ * offshore * (1.0 - here);
    col = mix(col, FOAM, agit * 0.50);
  }

  if (uDebug > 0.5) { o = vec4(here, band, agit, 1.0); return; }
  o = vec4(col, 1.0);
}`;

const VERT = `#version 300 es
in vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }`;

const W = 300, H = 300, T_METRIC = 1.7;
const LEVELS = [
  { u: 0.00, label: "0 refutes · u=0（零保持）" },
  { u: 0.60, label: "1 refute · u=0.60（稀疏飞白）" },
  { u: 0.80, label: "2 refutes · u=0.80" },
  { u: 1.00, label: "3+ refutes · u=1.00（封顶）" },
];

function makePane(u, label) {
  const div = document.createElement("div"); div.className = "pane";
  const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
  const cap = document.createElement("div"); cap.className = "cap"; cap.textContent = label;
  div.append(cv, cap); document.getElementById("panes").append(div);
  const gl = cv.getContext("webgl2", { preserveDrawingBuffer: true, antialias: false });
  const prog = gl.createProgram();
  for (const [type, src] of [[gl.VERTEX_SHADER, VERT], [gl.FRAGMENT_SHADER, FRAG]]) {
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    gl.attachShader(prog, s);
  }
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, "p");
  gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const U = n => gl.getUniformLocation(prog, n);
  gl.uniform2f(U("uRes"), W, H); gl.uniform1f(U("uTide"), 0.25);
  const draw = (t, debug, depth) => {
    gl.uniform1f(U("uTime"), t); gl.uniform1f(U("uU"), u);
    gl.uniform1f(U("uDebug"), debug); gl.uniform1f(U("uDepth"), depth);
    gl.viewport(0, 0, W, H); gl.drawArrays(gl.TRIANGLES, 0, 3);
  };
  const read = () => {
    const px = new Uint8Array(W * H * 4);
    gl.readPixels(0, 0, W, H, gl.RGBA, gl.UNSIGNED_BYTE, px); return px;
  };
  return { u, draw, read };
}

const panes = LEVELS.map(l => makePane(l.u, l.label));
const luma = (px, i) => (0.2126 * px[i] + 0.7152 * px[i + 1] + 0.0722 * px[i + 2]) / 255;

function measure(depth) {
  // baseline u=0
  panes[0].draw(T_METRIC, 0, depth); const base = panes[0].read();
  panes[0].draw(T_METRIC, 1, depth); const dbg0 = panes[0].read();
  const rows = [];
  for (const p of panes) {
    p.draw(T_METRIC, 0, depth); const img = p.read();
    p.draw(T_METRIC, 1, depth); const dbg = p.read();
    let n = 0, sumL = 0, sumL0 = 0, foamN = 0, minD = 1e9, maxAbsD = 0;
    let shoreContam = 0, alongHit = 0, acrossHit = 0, foamTot = 0;
    const foam = new Uint8Array(W * H);
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const here = dbg[i] / 255, band = dbg[i + 1] / 255, agit = dbg[i + 2] / 255;
      const L = luma(img, i), L0 = luma(base, i), d = L - L0;
      maxAbsD = Math.max(maxAbsD, Math.abs(d));
      if (here < 0.02) minD = Math.min(minD, d);
      if (band > 0.4) shoreContam = Math.max(shoreContam, agit);
      if (here < 0.02 && band < 0.05) {            // open-sea crop
        n++; sumL += L; sumL0 += L0;
        if (d > 0.06) { foamN++; foam[y * W + x] = 1; }
      }
    }
    const LAG = 5;
    for (let y = LAG; y < H - LAG; y++) for (let x = LAG; x < W - LAG; x++) {
      if (!foam[y * W + x]) continue; foamTot++;
      if (foam[(y + LAG) * W + (x + LAG)]) alongHit++;   // world (1,1) diag
      if (foam[(y - LAG) * W + (x + LAG)]) acrossHit++;  // world (1,-1) diag
    }
    const pA = alongHit / Math.max(1, foamTot), pX = acrossHit / Math.max(1, foamTot);
    rows.push({
      u: p.u, coverage: 100 * foamN / n,
      meanShiftPct: 100 * (sumL / n - sumL0 / n) / (sumL0 / n),
      minDelta: minD, maxAbsDelta: maxAbsD, shoreContam,
      aniso: Math.max(pA, pX) / Math.max(1e-4, Math.min(pA, pX)),
    });
  }
  return rows;
}

function render(rows) {
  const c = rows.map(r => r.coverage);
  const checks = [
    ["C1 零保持: u=0 与基线 maxΔ = 0", rows[0].maxAbsDelta === 0, rows[0].maxAbsDelta.toFixed(4)],
    ["C2 密度单调可辨: 0 < c(.6) ≤ 1.2%; c(.8) ≥ 2.5·c(.6); c(1) ≥ 2·c(.8); c(1) ≤ 6%",
      c[1] > 0.05 && c[1] <= 1.2 && c[2] >= 2.5 * c[1] && c[3] >= 2 * c[2] && c[3] <= 6,
      c.map(v => v.toFixed(2) + "%").join(" / ")],
    ["C3 与岸沫可区分: band>0.4 区 agit ≡ 0 且条纹各向异性 ≥ 2.0（岸 halo 各向同性 ≈1）",
      rows.every(r => r.shoreContam === 0) && rows[3].aniso >= 2.0,
      "contam=" + Math.max(...rows.map(r => r.shoreContam)) + ", aniso@u=1: " + rows[3].aniso.toFixed(1)],
    ["C4(+1) 明度中性: 开阔海 mean-luma 偏移 ≤ +2% 且逐像素 ΔL ≥ −1/255（绝不压暗）",
      rows[3].meanShiftPct <= 2 && rows.every(r => r.minDelta >= -1 / 255),
      "meanΔ@u=1: +" + rows[3].meanShiftPct.toFixed(2) + "%, minΔ: " + rows[3].minDelta.toFixed(4)],
  ];
  let html = "<table><tr><th>u</th><th>coverage%</th><th>meanΔluma%</th><th>minΔL</th><th>shore contam</th><th>aniso</th></tr>";
  for (const r of rows) html += `<tr><td>${r.u.toFixed(2)}</td><td>${r.coverage.toFixed(2)}</td><td>${r.meanShiftPct.toFixed(2)}</td><td>${r.minDelta.toFixed(4)}</td><td>${r.shoreContam.toFixed(3)}</td><td>${r.aniso.toFixed(1)}</td></tr>`;
  html += "</table><table><tr><th>判据</th><th>结果</th><th>实测</th></tr>";
  for (const [name, ok, val] of checks)
    html += `<tr><td style="text-align:left">${name}</td><td class="${ok ? "pass" : "fail"}">${ok ? "PASS" : "FAIL"}</td><td>${val}</td></tr>`;
  html += "</table>";
  document.getElementById("metrics").innerHTML = html;
  window.__metrics = { rows, checks: checks.map(([n, ok, v]) => ({ n, ok, v })) };
}

// verifier hook: composite the four panes at a fixed t into one base64 PNG
window.__capture = (t = T_METRIC) => {
  const depth = parseFloat(document.getElementById("depth").value);
  const comp = document.createElement("canvas");
  comp.width = 4 * W + 30; comp.height = H;
  const ctx = comp.getContext("2d");
  ctx.fillStyle = "#f4ecdd"; ctx.fillRect(0, 0, comp.width, comp.height);
  panes.forEach((p, i) => {
    p.draw(t, 0, depth);
    const px = p.read(), im = ctx.createImageData(W, H);
    for (let y = 0; y < H; y++) im.data.set(px.subarray(y * W * 4, (y + 1) * W * 4), (H - 1 - y) * W * 4);
    ctx.putImageData(im, i * (W + 10), 0);
  });
  return comp.toDataURL("image/png").split(",")[1];
};

const staticBox = document.getElementById("staticMode");
const depthSlider = document.getElementById("depth");
if (matchMedia("(prefers-reduced-motion: reduce)").matches) staticBox.checked = true;
let t0 = performance.now();
function frame() {
  const depth = parseFloat(depthSlider.value);
  document.getElementById("depthVal").textContent = depth.toFixed(2);
  const t = staticBox.checked ? T_METRIC : (performance.now() - t0) / 1000 + T_METRIC;
  for (const p of panes) p.draw(t, 0, depth);
  requestAnimationFrame(frame);
}
function remeasure() { render(measure(parseFloat(depthSlider.value))); }
depthSlider.addEventListener("change", remeasure);
remeasure(); frame();
document.getElementById("crit").textContent =
  "判据与主报告一致：C1 零保持（0 refutes 逐像素不变）· C2 密度单调（0/1/2/3+ 静态帧可辨，封顶 ≤6%）· " +
  "C3 形态可区分（岸沫=连续贴岸 halo，争议=离岸各向异性断续飞白，硬排除 coast>0.30）· " +
  "C4 明度中性（加亮元素、低覆盖率 ⇒ 全局 mean-luma 偏移有界，逐像素绝不压暗 ⇒ 不侵占深度轴）。静态模式下 uTime 冻结，密度是空间特征，三档依旧可辨。";
</script>
</body>
</html>
